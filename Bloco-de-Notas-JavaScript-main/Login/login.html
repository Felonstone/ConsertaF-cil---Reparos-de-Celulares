<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <form id="formLogin">
        <h2>Bem Vindo!</h2>
    
        <label>E-mail:</label>
        <input id="email" type="email" placeholder="Digite seu e-mail">
    
        <label>Senha:</label>
        <input id="senha" type="password" placeholder="Digite sua senha">
    

        <button id="button_Entrar" type="submit" class="btn-confirmar loading">
            Entrar
        </button>
    
        <a href="../index.html" class="btn-voltar">
            Voltar
        </a>
    
        <span id="good-message"></span>
        <span id="bad-message"></span>
    </form>
    <script src="script.js"></script>
</body>
</html>
